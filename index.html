<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Conducteur</title>
<style>
  :root{
    --navy:#1f3864; --navy-2:#274a8a; --ink:#1c2431; --muted:#6b7686;
    --line:#e4e8ef; --bg:#eef1f6; --card:#ffffff;
    --green:#1a9d5a; --green-bg:#e5f5ec;
    --orange:#e08a1e; --orange-bg:#fdf1de;
    --red:#d64550; --red-bg:#fde7e9;
    --radius:14px; --shadow:0 6px 24px rgba(20,40,80,.08);
    --font:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;justify-content:center;padding:24px 14px}
  .wrap{width:100%;max-width:820px}
  .state{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:48px 28px;text-align:center}
  .state h2{color:var(--navy);margin-bottom:8px}
  .state p{color:var(--muted);font-size:14px;line-height:1.5}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--navy);
    border-radius:50%;margin:0 auto 18px;animation:sp 0.8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .topbar{height:6px;background:linear-gradient(90deg,var(--navy),var(--navy-2))}
  .head{display:flex;gap:18px;align-items:center;padding:22px 24px;border-bottom:1px solid var(--line)}
  .photo{width:76px;height:76px;border-radius:12px;object-fit:cover;background:#dfe4ec;
    border:1px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:22px;font-weight:700}
  .head .name{font-size:20px;font-weight:700;color:var(--navy);line-height:1.2}
  .head .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .head .sub b{color:var(--ink);font-weight:600}
  .hire{display:inline-block;margin-top:7px;font-size:12px;font-weight:700;color:var(--navy);
    background:#eef2f9;border:1px solid #dbe3f0;padding:4px 10px;border-radius:8px}
  .hire span{color:var(--muted);font-weight:600}
  .statut{margin-left:auto;flex:none}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:6px 12px;border-radius:999px;white-space:nowrap}
  .badge.green{background:var(--green-bg);color:var(--green)}
  .badge.orange{background:var(--orange-bg);color:var(--orange)}
  .badge.red{background:var(--red-bg);color:var(--red)}
  .badge.grey{background:#eef1f6;color:var(--muted)}

  .section-label{font-size:11px;letter-spacing:.08em;font-weight:700;color:var(--muted);
    text-transform:uppercase;padding:18px 24px 6px}
  .info{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:6px 24px 4px}
  .tile{border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .tile .t{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
  .tile .v{font-size:16px;font-weight:700;color:var(--navy);margin-top:6px}
  .tile .n{font-size:11px;color:var(--green);margin-top:6px;font-weight:600}
  .tile .n.exp{color:var(--red)}

  .perf{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:6px 24px 24px}
  .score{border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .score .t{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--muted);
    text-transform:uppercase;min-height:28px}
  .gauge{position:relative;width:96px;height:96px;margin:12px auto 8px}
  .gauge svg{transform:rotate(-90deg)}
  .gauge .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .num b{font-size:26px;line-height:1;color:var(--ink)}
  .gauge .num span{font-size:11px;color:var(--muted)}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}

  .global{margin:0 24px 24px;border:1px solid var(--line);border-radius:12px;
    padding:18px;display:flex;align-items:center;gap:16px}
  .shield{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;flex:none;font-size:22px}
  .global .g-t{font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
  .global .g-v{font-size:18px;font-weight:800;margin-top:2px}
  .global .g-n{font-size:12px;color:var(--muted);margin-top:2px}

  .foot{display:flex;justify-content:space-between;align-items:center;
    padding:12px 24px;background:var(--navy);color:#cbd6ea;font-size:11px}
  .foot b{color:#fff}

  @media(max-width:560px){
    .info{grid-template-columns:1fr}
    .perf{grid-template-columns:1fr}
    .head{flex-wrap:wrap}
    .statut{margin-left:0;order:3;width:100%}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="state"><div class="spin"></div><h2>Chargement…</h2></div>
</div>

<script>
/* ============================================================
   >>> COLLEZ ICI le lien CSV publié de la table de TEST (Mohamed) <<<
   ============================================================ */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqTdB7WYp9w6oO7rS3rjGJDRF6RIUrT_yQF6cdVRKJLh8ZxaVvevbTtljg76PKTX44nhjC1FZ96o7F/pub?gid=653930440&single=true&output=csv";

function parseCSV(txt){
  const rows=[]; let f='',row=[],q=false;
  for(let i=0;i<txt.length;i++){const c=txt[i];
    if(q){ if(c==='"'&&txt[i+1]==='"'){f+='"';i++;} else if(c==='"'){q=false;} else f+=c; }
    else{ if(c==='"')q=true; else if(c===','){row.push(f);f='';}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
      else if(c!=='\r')f+=c; } }
  if(f.length||row.length){row.push(f);rows.push(row);}
  const head=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.some(x=>x&&x.trim()))
             .map(r=>Object.fromEntries(head.map((h,i)=>[h,(r[i]||'').trim()])));
}
async function loadData(){
  const res = await fetch(CSV_URL);
  if(!res.ok) throw new Error("fetch failed");
  return parseCSV(await res.text());
}

const has = v => v!==undefined && v!==null && String(v).trim()!=='';

/* find a column by fuzzy keyword (handles 'date d'embauchche' typo etc.) */
function pick(d, keyword){
  const k = Object.keys(d).find(h => h.toLowerCase().replace(/[^a-z]/g,'').includes(keyword));
  return k ? d[k] : '';
}
/* match a column containing ALL given fragments (bulletproof for accents/underscores) */
function pickAll(d){
  const frags=[].slice.call(arguments,1);
  const k=Object.keys(d).find(h=>{const n=h.toLowerCase().replace(/[^a-z]/g,'');return frags.every(f=>n.includes(f));});
  return k?d[k]:'';
}
/* Normalize ANY date format the sheet may emit -> jj/mm/aaaa */
function toDate(val){
  if(!has(val)) return '';
  var s = String(val).trim();
  if(/^\d+(\.\d+)?$/.test(s)){
    var d = new Date(Date.UTC(1899,11,30) + Math.round(+s)*86400000);
    return String(d.getUTCDate()).padStart(2,'0')+'/'
         + String(d.getUTCMonth()+1).padStart(2,'0')+'/'+d.getUTCFullYear();
  }
  var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso){ return iso[3]+'/'+iso[2]+'/'+iso[1]; }
  // Long French text date e.g. "jeudi, août 12, 2021"
  var MO={janvier:1,'février':2,fevrier:2,mars:3,avril:4,mai:5,juin:6,juillet:7,'août':8,aout:8,septembre:9,octobre:10,novembre:11,'décembre':12,decembre:12};
  var fr = s.toLowerCase().match(/([a-zà-ÿ]+)\s+(\d{1,2}),?\s+(\d{4})/);
  if(fr && MO[fr[1]]){
    return String(fr[2]).padStart(2,'0')+'/'+String(MO[fr[1]]).padStart(2,'0')+'/'+fr[3];
  }
  return s.split(' ')[0];
}

function scoreClass(v){v=+v; return v>=80?'green':v>=65?'orange':'red';}
function scoreTag(v){v=+v; return v>=80?'Satisfaisant':v>=65?'À améliorer':'Insuffisant';}
function riskClass(r){r=(r||'').toLowerCase();
  return r.includes('faible')?'green':r.includes('moyen')?'orange':(r.includes('élev')||r.includes('elev'))?'red':'grey';}
function parseDate(d){const p=(d||'').split('/');return p.length===3?new Date(+p[2],+p[1]-1,+p[0]):null;}
const COL={green:'var(--green)',orange:'var(--orange)',red:'var(--red)',grey:'var(--muted)'};
const BG ={green:'var(--green-bg)',orange:'var(--orange-bg)',red:'var(--red-bg)',grey:'#eef1f6'};

function gauge(v){
  const cls=scoreClass(v), r=42, c=2*Math.PI*r, off=c*(1-(+v)/100);
  return '<div class="gauge"><svg width="96" height="96" viewBox="0 0 96 96">'
    +'<circle cx="48" cy="48" r="'+r+'" fill="none" stroke="#eef1f6" stroke-width="8"/>'
    +'<circle cx="48" cy="48" r="'+r+'" fill="none" stroke="'+COL[cls]+'" stroke-width="8" '
    +'stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'"/></svg>'
    +'<div class="num"><b>'+v+'</b><span>/100</span></div></div>';
}
function scoreCard(title,v){
  if(!has(v)) return "";
  const cls=scoreClass(v);
  return '<div class="score"><div class="t">'+title+'</div>'+gauge(v)
    +'<span class="tag" style="background:'+BG[cls]+';color:'+COL[cls]+'">'+scoreTag(v)+'</span></div>';
}

function render(d){
  const app=document.getElementById('app');
  const st=(d.statut||'').toLowerCase();
  const stCls = st.includes('actif')?'green':st.includes('suspend')?'red':st?'orange':'grey';
  const rCls  = riskClass(d.niveau_risque);
  const initials=(d.nom||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('');
  const photo = has(d.photo_url)
    ? '<img class="photo" src="'+d.photo_url+'" alt="">'
    : '<div class="photo">'+initials+'</div>';
  const idLine = has(d.matricule) ? 'Matricule <b>'+d.matricule+'</b>' : 'Camion <b>'+(d.camion||'—')+'</b>';
  const fnLine = has(d.fonction) ? ' &middot; '+d.fonction : (has(d.anciennete)?' &middot; '+d.anciennete:'');

  // >>> DATE D'EMBAUCHE next to the photo <<<
  const embauche = toDate(pick(d,'embauch'));
  const hireLine = has(embauche)
    ? '<div class="hire"><span>Embauché le</span> '+embauche+'</div>' : '';

  const tiles=[];
  if(has(d.date_formation))
    tiles.push('<div class="tile"><div class="t">Date de formation</div><div class="v">'+toDate(d.date_formation)+'</div></div>');
  if(has(d.date_visite_medicale)){
    const vm=toDate(d.validite_medicale); const exp=parseDate(vm), expired=exp&&exp<new Date();
    const note = has(vm)
      ? (expired?'<div class="n exp">&#9888; Expiré le '+vm+'</div>'
                :'<div class="n">Valide jusqu\'au '+vm+'</div>') : '';
    tiles.push('<div class="tile"><div class="t">Visite médicale</div><div class="v">'+toDate(d.date_visite_medicale)+'</div>'+note+'</div>');
  }
  if(has(d.tournee)){
    var rt = riskClass(pickAll(d,'risk','tourn'));
    var rtStyle = has(pickAll(d,'risk','tourn')) ? ' style="background:'+BG[rt]+';border-color:'+COL[rt]+'"' : '';
    var rtVal = has(pickAll(d,'risk','tourn')) ? ' style="color:'+COL[rt]+'"' : '';
    tiles.push('<div class="tile"'+rtStyle+'><div class="t">Tournée d\'affectation</div><div class="v"'+rtVal+'>'+d.tournee+'</div></div>');
  }
  if(has(d.agence))
    tiles.push('<div class="tile"><div class="t">Agence</div><div class="v">'+d.agence+'</div></div>');

  const scores = scoreCard('Score IVMS (S-1)',d.score_ivms)
               + scoreCard('Évaluation théorique',d.score_theorique)
               + scoreCard('Évaluation pratique',d.score_pratique);

  let html='<div class="card"><div class="topbar"></div><div class="head">'+photo
    +'<div><div class="name">'+(d.nom||'—')+'</div>'
    +'<div class="sub">'+idLine+fnLine+'</div>'
    +'<div class="sub">ID <b>'+d.id_token+'</b></div>'
    +hireLine
    +'</div>'
    +'<div class="statut"><span class="badge '+stCls+'">&#9679; '+(d.statut||'—')+'</span></div></div>';

  if(tiles.length)
    html+='<div class="section-label">Informations</div><div class="info">'+tiles.join('')+'</div>';
  if(scores)
    html+='<div class="section-label">Performances</div><div class="perf">'+scores+'</div>';
  if(has(d.niveau_risque))
    html+='<div class="global"><div class="shield" style="background:'+BG[rCls]+';color:'+COL[rCls]+'">&#128737;</div>'
      +'<div><div class="g-t">Niveau de risque global</div>'
      +'<div class="g-v" style="color:'+COL[rCls]+'">'+d.niveau_risque+'</div>'
      +'<div class="g-n">'+(rCls==='green'?'Conducteur conforme aux standards sécurité.':rCls==='orange'?'Vigilance recommandée.':rCls==='red'?'Action corrective requise.':'')+'</div></div></div>';

  html+='<div class="foot"><span>Permis Interne de Conduite &middot; <b>CENTRALE DANONE</b></span><span>WISE&#178; &middot; v2-dates</span></div></div>';
  app.innerHTML=html;
}

function notFound(id){
  document.getElementById('app').innerHTML=
    '<div class="state"><h2>Conducteur introuvable</h2>'
    +'<p>Aucun conducteur ne correspond à l\'identifiant <b>'+(id||'(vide)')+'</b>.<br>'
    +'Vérifiez le lien du QR code.</p></div>';
}

(async function(){
  let data;
  try{ data=await loadData(); }
  catch(e){ document.getElementById('app').innerHTML=
    '<div class="state"><h2>Erreur de chargement</h2>'
    +'<p>Impossible de lire les données du conducteur.<br>Vérifiez le lien CSV et réessayez.</p></div>'; return; }
  const id=new URLSearchParams(location.search).get('id');
  if(!id){ render(data[0]); return; }
  const d=data.find(x=>(x.id_token||'').trim()===id.trim());
  d ? render(d) : notFound(id);
})();
</script>
</body>
</html>
